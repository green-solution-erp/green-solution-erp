{% extends "base.html" %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center mt-5">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow-sm border-0 border-top border-4 border-success">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <h2 class="text-success"><i class="bi bi-recycle"></i> Green Print</h2>
                    <p class="text-muted">Acceso al Sistema ERP</p>
                </div>

                <form action="{{ url_for('login') }}" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="username" name="username"
                                required autofocus autocomplete="username">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-muted">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password"
                                name="password" required autocomplete="current-password">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-success w-100 py-2"><i
                            class="bi bi-box-arrow-in-right me-2"></i> Iniciar Sesión</button>

                    <div class="text-center mt-4">
                        <small class="text-muted">Desarrollado para Paraguay 🇵🇾</small>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
