{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Configuración del Sistema</h1>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-white">
                <h5 class="mb-0">Parámetros Generales</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="tipo_cambio" class="form-label">Tipo de Cambio del Día (₲ x USD)</label>
                        <input type="number" step="0.01" class="form-control" id="tipo_cambio" name="tipo_cambio"
                            value="{{ config['tipo_cambio'] }}" required>
                        <div class="form-text">Se usará para calcular cobros en Guaraníes a partir de precios en
                            Dólares.</div>
                    </div>
                    <div class="mb-3">
                        <label for="iva_porcentaje" class="form-label">IVA (%)</label>
                        <input type="number" step="0.01" class="form-control" id="iva_porcentaje" name="iva_porcentaje"
                            value="{{ config['iva_porcentaje'] }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar
                        Configuración</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
